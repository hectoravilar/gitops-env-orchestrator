name: CI - Build, Push to ECR, and Update Manifests

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
  workflow_dispatch: # Allows manual triggering from the Actions tab

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: gitops-ecr-repository

jobs:
  docker:
    runs-on: ubuntu-latest
    
    # Grant write permissions to allow the GitHub Actions bot to commit changes back to the repository
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker (Generate dynamic tag from Git SHA)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Kubernetes Manifest with new Image Tag
        run: |
          # Extract the exact short SHA generated by the git revision
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${SHORT_SHA}"
          
          echo "Updating app.yaml to use image: $IMAGE_URI"
          
          # Find the "image:" line in the deployment manifest and replace it with the new URI
          sed -i "s|image: .*|image: $IMAGE_URI|g" k8s/app.yaml

          # Configure the GitHub Actions bot identity for the commit
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add k8s/app.yaml
          git commit -m "chore(gitops): update image tag to sha-${SHORT_SHA} [skip ci]"
          git push