apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-env-orchestrator
  labels:
    app: gitops-env-orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      # This label binds the Deployment to the Service defined below
      app: gitops-env-orchestrator
  template:
    metadata:
      labels:
        app: gitops-env-orchestrator
    spec:
      containers:
        - name: gitops-env-orchestrator
          image: 779846804202.dkr.ecr.us-east-1.amazonaws.com/gitops-ecr-repository:v1.0.2
          ports:
            - containerPort: 8000

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: gitops-service
spec:
  # Instructs AWS to provision a public Elastic Load Balancer (ELB)
  type: ClusterIP
  selector:
    # Must match the Deployment label exactly for traffic routing to work
    app: gitops-env-orchestrator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
